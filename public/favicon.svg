<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- White background -->
  <rect width="32" height="32" rx="6" fill="#ffffff"/>
  <!-- Blue shadow box -->
  <rect x="6" y="6" width="18" height="18" fill="#1D4ED8"/>
  <!-- White border box -->
  <rect x="3" y="3" width="18" height="18" fill="white" stroke="#0F172A" stroke-width="1.5"/>
  <!-- P letter -->
  <text x="12" y="17.5" text-anchor="middle" 
    font-family="Georgia, serif" 
    font-weight="900" 
    font-size="14" 
    fill="#0F172A">P</text>
</svg>
